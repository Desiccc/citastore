<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tambah Produk - Toko Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .navbar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .input-field { transition: all 0.3s ease; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>
    <nav class="navbar text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🛍️</span>
                    <span class="font-bold text-xl">Toko Online</span>
                    <span class="ml-4 px-3 py-1 bg-yellow-400 text-yellow-900 rounded-full text-xs font-bold">ADMIN</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-8 py-5">
                <h2 class="text-xl font-bold">➕ Tambah Produk Baru</h2>
            </div>

            <form class="p-8">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Kategori</label>
                    <select class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none">
                        <option>— Pilih Kategori —</option>
                        <option>Sepatu</option>
                        <option>Baju</option>
                        <option>Aksesoris</option>
                    </select>
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Produk</label>
                    <input type="text" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="Masukkan nama produk">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Deskripsi</label>
                    <textarea class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" rows="4" placeholder="Deskripsi produk"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-5 mb-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Harga (Rp)</label>
                        <input type="number" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Stok</label>
                        <input type="number" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="0">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Foto Produk</label>
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:border-indigo-400 transition cursor-pointer">
                        <div class="text-4xl mb-2">📁</div>
                        <p class="text-gray-500 font-medium">Klik atau seret file ke sini</p>
                        <p class="text-gray-400 text-sm mt-1">Format: JPG, PNG. Maksimal 2MB.</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button type="button" class="px-6 py-3 border-2 border-gray-200 text-gray-600 rounded-xl font-semibold hover:bg-gray-50 transition">← Kembali</button>
                    <button type="submit" class="btn-primary px-8 py-3 rounded-xl text-white font-bold">💾 Simpan Produk</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
