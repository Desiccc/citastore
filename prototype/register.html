<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Toko Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .input-field { transition: all 0.3s ease; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
        .bg-pattern { position: fixed; top: -50%; right: -20%; width: 800px; height: 800px; background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 70%); border-radius: 50%; pointer-events: none; }
        .bg-pattern-2 { position: fixed; bottom: -30%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139, 92, 246, 0.1), transparent 70%); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4 relative">
    <div class="bg-pattern"></div>
    <div class="bg-pattern-2"></div>

    <div class="glass-card rounded-2xl shadow-2xl overflow-hidden w-full max-w-md relative z-10">
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-center py-8 px-6">
            <div class="text-4xl mb-2">📝</div>
            <h1 class="text-2xl font-bold">Daftar Akun</h1>
            <p class="text-indigo-200 text-sm mt-1">Buat akun baru untuk mulai belanja</p>
        </div>
        <div class="p-8">
            <form>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Lengkap</label>
                    <input type="text" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="Nama Anda">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="nama@email.com">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Kata Sandi</label>
                    <input type="password" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="Minimal 8 karakter">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Konfirmasi Kata Sandi</label>
                    <input type="password" class="input-field w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-800 outline-none" placeholder="Ulangi kata sandi">
                </div>
                <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-bold text-sm uppercase tracking-wider">Daftar</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500">Sudah punya akun? <a href="login.html" class="text-indigo-600 font-semibold hover:text-indigo-800">Masuk</a></p>
            </div>
        </div>
    </div>
</body>
</html>
